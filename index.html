// ── BACKGROUND PARTICLES ──────────────────────────────────────────────────────
const cvs=document.getElementById("cvs");
const ctx=cvs.getContext("2d");
let W=cvs.width=window.innerWidth,H=cvs.height=window.innerHeight;
window.addEventListener("resize",()=>{W=cvs.width=window.innerWidth;H=cvs.height=window.innerHeight;});

const parts=Array.from({length:100},()=>({
  x:Math.random()*W,y:Math.random()*H,
  vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,
  r:Math.random()*1.3+.3,a:Math.random()*.3+.04
}));

(function drawBg(){
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<parts.length;i++){
    for(let j=i+1;j<parts.length;j++){
      const dx=parts[i].x-parts[j].x,dy=parts[i].y-parts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<100){ctx.beginPath();ctx.moveTo(parts[i].x,parts[i].y);ctx.lineTo(parts[j].x,parts[j].y);ctx.strokeStyle=`rgba(99,102,241,${.06*(1-d/100)})`;ctx.lineWidth=.4;ctx.stroke();}
    }
    const p=parts[i];
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(148,163,184,${p.a})`;ctx.fill();
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
  }
  requestAnimationFrame(drawBg);
})();

const mainLinks=links.filter(d=>d.type==="main");
const flowDots=g.append("g").selectAll("circle.fd").data(mainLinks).join("circle")
  .attr("r",2).attr("fill","#818cf8").attr("opacity",.7);

// Node groups
const nodeG=g.append("g").selectAll("g.nd").data(nodes).join("g").attr("class","nd")
  .style("cursor","pointer")
  .call(d3.drag()
    .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
  .on("click",(e,d)=>{e.stopPropagation();showPanel(d);});

// Pulse rings for gold/red nodes
nodeG.filter(d=>d.risk==="gold"||d.risk==="red").append("circle")
  .attr("class","pring")
  .attr("r",d=>d.type==="center"?90:d.group==="branch"?55:38)
  .attr("fill","none").attr("stroke",d=>C[d.risk]).attr("stroke-width",1.5).attr("opacity",0);

// Main circles
const nodeColor=d=>{
  if(d.group==="branch") return CAT_COLOR[d.cat]||"#60a5fa";
  return C[d.risk]||"#60a5fa";
};

nodeG.append("circle")
  .attr("r",d=>d.type==="center"?58:d.group==="branch"?38:d.risk==="gold"?26:22)
  .attr("fill",d=>d.type==="center"?"rgba(30,41,59,.95)":"rgba(15,23,42,.88)")
  .attr("stroke",nodeColor)
  .attr("stroke-width",d=>d.type==="center"?3:d.group==="branch"?2.5:d.risk==="gold"?2:1.5)
  .attr("filter",d=>`url(#glow-${d.risk})`);

// Labels
nodeG.append("text").attr("class","node-label")
  .attr("text-anchor","middle").attr("dominant-baseline","middle")
  .attr("fill",d=>d.type==="center"?"#f1f5f9":nodeColor(d))
  .attr("font-size",d=>d.type==="center"?"12px":d.group==="branch"?"9px":"7.5px")
  .attr("font-weight",d=>d.group!=="leaf"?"700":"500")
  .each(function(d){
    const lines=d.label.split("\n");
    const el=d3.select(this);
    const lh=11;
    const y0=-(lines.length-1)*lh/2;
    lines.forEach((line,i)=>{el.append("tspan").attr("x",0).attr("dy",i===0?y0:lh).text(line);});
  });

sim.on("tick",()=>{
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  nodeG.attr("transform",d=>`translate(${d.x},${d.y})`);
});

// Animate flow dots
let ft=0;
(function anim(){
  ft=(ft+.004)%1;
  flowDots.each(function(d,i){
    const s=d.source,t=d.target;
    if(!s.x) return;
    const f=(ft+i*.07)%1;
    d3.select(this).attr("cx",s.x+(t.x-s.x)*f).attr("cy",s.y+(t.y-s.y)*f);
  });
  requestAnimationFrame(anim);
})();

// Pulse rings for gold/red
(function animPulse(){
  d3.selectAll(".pring").each(function(d){
    const el=d3.select(this);
    const base=d.type==="center"?90:d.group==="branch"?55:38;
    const phase=(Date.now()/2400+nodes.indexOf(d)*.22)%1;
    el.attr("r",base+phase*20).attr("opacity",.6*(1-phase));
  });
  requestAnimationFrame(animPulse);
})();

svg.on("click",closePanel);

// ── PANEL ─────────────────────────────────────────────────────────────────────
const panel=document.getElementById("panel");
function showPanel(d){
  document.getElementById("pbadge").className="pbadge "+(d.risk||"blue");
  document.getElementById("pbadge").textContent=RL[d.risk]||d.risk;
  document.getElementById("ptitle").textContent=d.label.replace(/\n/g," ");
  document.getElementById("pgeno").textContent=d.geno||"";
  document.getElementById("pdesc").textContent=d.desc||"";
  document.getElementById("pstats").innerHTML=(d.stats||[]).map(s=>
    `<div class="pstat"><div class="pstat-l">${s.l}</div><div class="pstat-v">${s.v}</div></div>`
  ).join("");
  panel.classList.add("open");
}
function closePanel(){panel.classList.remove("open");}
document.getElementById("pclose").addEventListener("click",e=>{e.stopPropagation();closePanel();});

// ── SEARCH ────────────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input",function(){
  const q=this.value.toLowerCase();
  if(!q){nodeG.select("circle").attr("opacity",1);return;}
  nodeG.select("circle").attr("opacity",d=>{
    const match=(d.id+d.label+(d.geno||"")+(d.desc||"")).toLowerCase().includes(q);
    return match?1:.1;
  });
});

// ── FILTER BUTTONS ────────────────────────────────────────────────────────────
document.querySelectorAll(".fbtn").forEach(btn=>{
  btn.addEventListener("click",function(){
    const cat=this.dataset.cat;
    const active=this.classList.toggle("active");
    // Get active cats
    const activeCats=[...document.querySelectorAll(".fbtn.active")].map(b=>b.dataset.cat);
    if(activeCats.length===0){nodeG.select("circle").attr("opacity",1);return;}
    nodeG.select("circle").attr("opacity",d=>{
      if(d.type==="center") return 1;
      return activeCats.includes(d.cat)?1:.08;
    });
  });
});

// Initial zoom out to show all nodes
setTimeout(()=>{
  svg.transition().duration(1200).call(
    zoom.transform,d3.zoomIdentity.translate(W2*.5,H2*.5).scale(.45).translate(-W2*.5,-H2*.5)
  );
},1500);
</script>
</body>
</html>
