   stats:[{label:"Metabolic", value:"Favorable (FTO TT)"},{label:"Cardiovascular", value:"Strong endurance base (ACTN3 XX)"},{label:"Main Risk", value:"APOE \u03b54 \u2014 Alzheimer's pathway"},{label:"Projected", value:"Physical health into 70s/80s"}]},
  {id:"cardio_risk", label:"Cardio\nRisk", group:"leaf", parent:"longevity", risk:"yellow",
   genotype:"IL-6 CC + MTHFR AG",
   description:"IL-6 CC and MTHFR C677T both contribute to cardiovascular risk through inflammatory and homocysteine pathways. Regular monitoring of CRP, homocysteine, and lipids is recommended.",
   stats:[{label:"IL-6 Risk", value:"Higher inflammatory baseline"},{label:"MTHFR Risk", value:"Elevated homocysteine"},{label:"Protective", value:"FTO TT, ACTN3 XX endurance physiology"},{label:"Net Risk", value:"Moderate \u2014 manageable with lifestyle"}]},

  // Ancestry leaf
  {id:"northern_eu", label:"Northern\nEuropean", group:"leaf", parent:"ancestry", risk:"blue",
   genotype:"rs1426654 = AA \u00b7 rs4988235 = AA",
   description:"Genetic ancestry markers consistent with Northern/Northwestern European descent. SLC24A5 rs1426654 AA (European skin), lactase persistence AA (Northern European), and MC1R Celtic variant all confirm Irish/British/Northern European heritage.",
   stats:[{label:"Primary Region", value:"Northwestern Europe"},{label:"Celtic Component", value:"High (MC1R R151C variant)"},{label:"Lactase Persistence", value:"Evolved ~7,500 BCE in this region"},{label:"Skin Gene", value:"SLC24A5 European variant"}]},

  // Vitamin D leaves
  {id:"vitd_il6", label:"Vit D &\nInflammation", group:"leaf", parent:"vitamind", risk:"yellow",
   genotype:"rs1800795 = CC",
   description:"IL-6 CC elevates systemic inflammation, reducing Vitamin D receptor signaling efficacy. Higher Vitamin D levels (>50 ng/mL) may be needed to achieve the same anti-inflammatory effect.",
   stats:[{label:"Target Level", value:">50 ng/mL (above standard)"},{label:"Supplement", value:"2,000\u20134,000 IU D3/day + K2"},{label:"Test Frequency", value:"Annual 25-OH Vitamin D"},{label:"Cofactors", value:"Magnesium, K2-MK7"}]},
  {id:"b_vitamins", label:"B-Vitamin\nMetabolism", group:"leaf", parent:"vitamind", risk:"yellow",
   genotype:"MTHFR rs1801133 = AG",
   description:"MTHFR C677T reduces conversion of folic acid to active methylfolate, affecting the entire one-carbon metabolism pathway. Use methylated B-vitamin supplements only.",
   stats:[{label:"Active Folate", value:"Use L-methylfolate only"},{label:"B12 Form", value:"Methylcobalamin preferred"},{label:"Dose", value:"Methylfolate 400\u2013800mcg + B12 1000mcg"},{label:"Monitor", value:"Homocysteine annually (target <10 \u03bcmol/L)"}]},

  // Notable findings leaves
  {id:"top1_warfarin", label:"\u26a0\ufe0f Warfarin\nAlert", group:"leaf", parent:"notable", risk:"red",
   genotype:"CYP2C9 *1/*2 \u2014 rs1799853 CT",
   description:"MOST CLINICALLY URGENT: CYP2C9 *1/*2 means standard warfarin doses will be ~20% too high, risking supratherapeutic anticoagulation and bleeding. This MUST be flagged in the EMR and disclosed to any treating physician before anticoagulation therapy.",
   stats:[{label:"Urgency", value:"HIGH \u2014 Flag in EMR immediately"},{label:"Dose Adjustment", value:"Reduce warfarin ~20%"},{label:"Monitoring", value:"More frequent INR checks required"},{label:"Alternative", value:"DOACs may be preferable (rivaroxaban)"}]},
  {id:"top2_apoe", label:"APOE \u03b54\nAlert", group:"leaf", parent:"notable", risk:"red",
   genotype:"APOE \u03b53/\u03b54",
   description:"Second most actionable finding: APOE \u03b54. Begin a structured Alzheimer's prevention protocol now. Evidence-based: \u226550 min/week vigorous cardio, 7\u20139 hours sleep, MIND diet, cognitive training.",
   stats:[{label:"Start At", value:"Now \u2014 40s is optimal prevention window"},{label:"Exercise Rx", value:"\u2265150 min/week vigorous cardio"},{label:"Sleep Rx", value:"7\u20139 hours, optimize deep sleep"},{label:"Diet Rx", value:"MIND diet + omega-3 DHA 1g/day"}]},
  {id:"top3_oxtr", label:"OXTR GG\nSuper-Empath", group:"leaf", parent:"notable", risk:"purple",
   genotype:"OXTR rs53576 = GG",
   description:"OXTR GG is one of the most positive findings: the highest-empathy genotype. In an ER physician, this translates to exceptional patient communication, high family trust, and natural ability to provide comfort in crisis. Also: compassion fatigue risk \u2014 boundaries matter.",
   stats:[{label:"Empathy Level", value:"Highest genetic potential"},{label:"Clinical Strength", value:"Patient rapport, crisis communication"},{label:"Watch For", value:"Compassion fatigue in ER setting"},{label:"Protective", value:"Strong social bonds buffer stress"}]}
];

const links = [];
nodeData.forEach(n => {
  if (n.group === "branch") links.push({source:"center", target:n.id, type:"main"});
  if (n.group === "leaf") links.push({source:n.parent, target:n.id, type:"leaf"});
});

const riskColors = {
  green:"#34d399", yellow:"#fbbf24", red:"#f87171",
  purple:"#a78bfa", blue:"#60a5fa", center:"#f8fafc"
};

const riskLabels = {
  green:"Favorable", yellow:"Moderate Risk", red:"Elevated Risk",
  purple:"Notable / Special", blue:"Ancestry / Trait", center:"Genome Overview"
};

// Background particle canvas
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener("resize", () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });

const particles = Array.from({length:130}, () => ({
  x: Math.random() * W, y: Math.random() * H,
  vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
  r: Math.random()*1.5+0.3, alpha: Math.random()*0.35+0.05
}));

function drawParticles() {
  ctx.clearRect(0,0,W,H);
  for (let i=0;i<particles.length;i++) {
    for (let j=i+1;j<particles.length;j++) {
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if (d<110) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=`rgba(99,102,241,${0.07*(1-d/110)})`;
        ctx.lineWidth=0.5;
        ctx.stroke();
      }
    }
    const p=particles[i];
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(148,163,184,${p.alpha})`;
    ctx.fill();
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>W) p.vx*=-1;
    if(p.y<0||p.y>H) p.vy*=-1;
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

// D3 graph
const width=window.innerWidth, height=window.innerHeight;
const svg=d3.select("#svg-container").append("svg")
  .attr("width","100%").attr("height","100%")
  .attr("viewBox",[0,0,width,height]);

const defs=svg.append("defs");
Object.entries(riskColors).forEach(([k]) => {
  const f=defs.append("filter").attr("id",`glow-${k}`).attr("x","-60%").attr("y","-60%").attr("width","220%").attr("height","220%");
  f.append("feGaussianBlur").attr("stdDeviation", k==="center"?10:k==="red"?7:5).attr("result","blur");
  const m=f.append("feMerge");
  m.append("feMergeNode").attr("in","blur");
  m.append("feMergeNode").attr("in","SourceGraphic");
});

const g=svg.append("g");
const zoom=d3.zoom().scaleExtent([0.15,5]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zoom);

const sim=d3.forceSimulation(nodeData)
  .force("link",d3.forceLink(links).id(d=>d.id).distance(d=>d.type==="main"?210:120).strength(0.55))
  .force("charge",d3.forceManyBody().strength(d=>d.type==="center"?-1400:d.group==="branch"?-650:-220))
  .force("center",d3.forceCenter(width/2,height/2))
  .force("collision",d3.forceCollide().radius(d=>d.type==="center"?95:d.group==="branch"?65:48));

// Links
const link=g.append("g").selectAll("line").data(links).join("line")
  .attr("stroke",d=>d.type==="main"?"rgba(99,102,241,0.45)":"rgba(71,85,105,0.3)")
  .attr("stroke-width",d=>d.type==="main"?2:1)
  .attr("stroke-dasharray",d=>d.type==="leaf"?"5,5":null);

// Flow dots
const flowDots=g.append("g").selectAll("circle.flow").data(links.filter(d=>d.type==="main"))
  .join("circle").attr("r",2.5).attr("fill","#818cf8").attr("opacity",0.75);

// Nodes
const node=g.append("g").selectAll("g.node").data(nodeData).join("g")
  .attr("class","node").style("cursor","pointer")
  .call(d3.drag()
    .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
  .on("click",(e,d)=>{e.stopPropagation();showPanel(d);});

// Pulse rings
node.filter(d=>d.risk==="red"||d.risk==="yellow").append("circle")
  .attr("class","pulse-ring")
  .attr("r",d=>d.type==="center"?85:d.group==="branch"?52:36)
  .attr("fill","none")
  .attr("stroke",d=>riskColors[d.risk])
  .attr("stroke-width",1.5)
  .attr("opacity",0);

// Circles
node.append("circle")
  .attr("r",d=>d.type==="center"?54:d.group==="branch"?36:24)
  .attr("fill",d=>d.type==="center"?"rgba(30,41,59,0.95)":"rgba(15,23,42,0.88)")
  .attr("stroke",d=>riskColors[d.risk]||"#60a5fa")
  .attr("stroke-width",d=>d.type==="center"?3:d.group==="branch"?2:1.5)
  .attr("filter",d=>`url(#glow-${d.risk})`);

// Labels
node.append("text").attr("class","node-label")
  .attr("text-anchor","middle").attr("dominant-baseline","middle")
  .attr("fill",d=>riskColors[d.risk]||"#e2e8f0")
  .attr("font-size",d=>d.type==="center"?"11px":d.group==="branch"?"9px":"8px")
  .attr("font-weight",d=>d.group!=="leaf"?"700":"500")
  .each(function(d){
    const lines=d.label.split("\n");
    const el=d3.select(this);
    const lh=12;
    const y0=-(lines.length-1)*lh/2;
    lines.forEach((line,i)=>{
      el.append("tspan").attr("x",0).attr("dy",i===0?y0:lh).text(line);
    });
  });

sim.on("tick",()=>{
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
      .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  node.attr("transform",d=>`translate(${d.x},${d.y})`);
});

// Animate flow dots
let ft=0;
(function animFlow(){
  ft=(ft+0.005)%1;
  flowDots.each(function(d,i){
    const src=d.source,tgt=d.target;
    if(!src.x) return;
    const t=(ft+i*0.09)%1;
    d3.select(this).attr("cx",src.x+(tgt.x-src.x)*t).attr("cy",src.y+(tgt.y-src.y)*t);
  });
  requestAnimationFrame(animFlow);
})();

// Pulse animation
(function animPulse(){
  d3.selectAll(".pulse-ring").each(function(d){
    const el=d3.select(this);
    const base=d.type==="center"?85:d.group==="branch"?52:36;
    const phase=(Date.now()/2200+nodeData.indexOf(d)*0.28)%1;
    el.attr("r",base+phase*22).attr("opacity",0.55*(1-phase));
  });
  requestAnimationFrame(animPulse);
})();

// Panel
const panel=document.getElementById("detail-panel");
function showPanel(d){
  document.getElementById("panel-badge").className=`panel-badge ${d.risk}`;
  document.getElementById("panel-badge").textContent=riskLabels[d.risk]||d.risk;
  document.getElementById("panel-title").textContent=d.label.replace("\n"," ");
  document.getElementById("panel-genotype").textContent=d.genotype||"";
  document.getElementById("panel-description").textContent=d.description||"";
  document.getElementById("panel-stats").innerHTML=(d.stats||[]).map(s=>
    `<div class="panel-stat"><div class="panel-stat-label">${s.label}</div><div class="panel-stat-value">${s.value}</div></div>`
  ).join("");
  panel.classList.add("open");
}
function closePanel(){ panel.classList.remove("open"); }

document.getElementById("panel-close").addEventListener("click",e=>{e.stopPropagation();closePanel();});
svg.on("click",()=>closePanel());
</script>
</body>
</html>
