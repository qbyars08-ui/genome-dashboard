<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Byars Genomic Intelligence</title>
<style>
/* ══════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════ */
:root {
  --bg:      #111318;
  --sf:      #181d27;
  --sf2:     #1e2535;
  --sf3:     #242f42;
  --bd:      #222b3a;
  --bd2:     rgba(255,255,255,.12);

  --t1: #E8ECF4;
  --t2: #7A8599;
  --t3: #4A5568;
  --t4: #2D3748;

  --red:    #E05A5A; --red-d:  rgba(224,90,90,.08);  --red-b:  rgba(224,90,90,.25);
  --purple: #9B7ADB; --pur-d:  rgba(155,122,219,.08); --pur-b:  rgba(155,122,219,.25);
  --orange: #D4855A; --ora-d:  rgba(212,133,90,.08);  --ora-b:  rgba(212,133,90,.25);
  --amber:  #C9A84C; --amb-d:  rgba(201,168,76,.08);  --amb-b:  rgba(201,168,76,.25);
  --green:  #5AAD8B; --grn-d:  rgba(90,173,139,.08);  --grn-b:  rgba(90,173,139,.25);
  --blue:   #5B8BD4; --blu-d:  rgba(91,139,212,.08);  --blu-b:  rgba(91,139,212,.25);
  --cyan:   #5BA8C9;

  --r-s: 8px; --r-m: 14px; --r-l: 18px; --r-xl: 22px;
  --ease: cubic-bezier(.4,0,.2,1);
  --spring: cubic-bezier(.34,1.56,.64,1);
  --expo: cubic-bezier(.16,1,.3,1);
}

/* ══════════════════════════════════════
   RESET
══════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',system-ui,sans-serif;
  background:var(--bg);color:var(--t1);min-height:100vh;min-height:100dvh;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  -webkit-tap-highlight-color:transparent;transition:background .25s var(--ease),color .25s var(--ease);
  line-height:1.65;
}
body.is-doctor{background:#fff;color:#111}
button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
input{font:inherit;border:none;background:none;color:inherit;outline:none}
a{color:inherit;text-decoration:none}

/* ══════════════════════════════════════
   LOADER
══════════════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s var(--ease),visibility .5s;
}
#loader.done{opacity:0;visibility:hidden;pointer-events:none}
.dna-svg{width:56px;height:112px;margin-bottom:20px}
.dna-strand{fill:none;stroke-width:2;stroke-linecap:round;opacity:.6}
.dna-s1{stroke:var(--blue);animation:dna-a 2.4s ease-in-out infinite}
.dna-s2{stroke:var(--purple);animation:dna-a 2.4s ease-in-out infinite .35s}
.dna-rung{stroke:var(--t4);stroke-width:1;opacity:.3;animation:dna-r 2.4s ease-in-out infinite}
@keyframes dna-a{0%,100%{opacity:.25;stroke-dashoffset:0}50%{opacity:.7;stroke-dashoffset:6}}
@keyframes dna-r{0%,100%{opacity:.12}50%{opacity:.3}}
.load-msg{font-size:15px;font-weight:500;color:var(--t2);margin-top:4px;letter-spacing:.01em}
.load-dots span{animation:dot-pulse 1.4s ease-in-out infinite both}
.load-dots span:nth-child(1){animation-delay:0s}
.load-dots span:nth-child(2){animation-delay:.2s}
.load-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot-pulse{0%,80%,100%{opacity:.15}40%{opacity:1}}
@media(prefers-reduced-motion:reduce){.dna-strand,.dna-rung{animation:none;opacity:.5}.load-dots span{animation:none;opacity:.7}}

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
#app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;opacity:0;transition:opacity .4s var(--ease)}
#app.show{opacity:1}
#content{padding-bottom:56px}
.view{animation:vi .28s var(--expo) both}
@keyframes vi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════ */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:rgba(11,15,25,.93);backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  border-top:1px solid var(--bd);z-index:500;
  display:none;justify-content:space-around;
  padding:0 0 env(safe-area-inset-bottom,0);
  transition:background .25s var(--ease),border-color .25s var(--ease);
}
body.is-doctor #nav{background:rgba(255,255,255,.93);border-top-color:#E5E5EA}
#nav .nb{
  flex:1;padding:12px 4px 10px;font-size:11px;font-weight:600;color:var(--t3);
  position:relative;transition:color .15s var(--ease);letter-spacing:.01em;
  min-height:44px;display:flex;align-items:center;justify-content:center;
}
#nav .nb.on{color:var(--t1)}
body.is-doctor #nav .nb{color:#9CA3AF}
body.is-doctor #nav .nb.on{color:#111}
#nav .nb.on::after{
  content:'';position:absolute;top:0;left:22%;right:22%;height:2px;
  background:var(--t1);border-radius:0 0 2px 2px;
}
body.is-doctor #nav .nb.on::after{background:#111}

/* ══════════════════════════════════════
   HOME — FAMILY HUB
══════════════════════════════════════ */
.hub-hdr{padding:56px 24px 28px;text-align:center}
.hub-wordmark{display:inline-flex;align-items:center;gap:9px;margin-bottom:18px}
.hub-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--blue) 0%,var(--purple) 100%);flex-shrink:0}
.hub-mark-lbl{font-size:12px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.hub-title{font-size:32px;font-weight:700;letter-spacing:-.04em;line-height:1.1}
.hub-sub{font-size:14px;font-weight:400;color:var(--t2);margin-top:5px;letter-spacing:.01em}

.member-list{padding:0 16px 8px;display:flex;flex-direction:column;gap:10px}
.mc{
  background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-l);
  padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:background .15s var(--ease),transform .15s var(--spring),border-color .15s;
}
.mc:hover{background:var(--sf2);border-color:rgba(255,255,255,.1)}
.mc:active{transform:scale(.98);background:var(--sf3)}
.mc-av{
  width:48px;height:48px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:700;letter-spacing:-.5px;
  flex-shrink:0;border:2px solid;
}
.mc-info{flex:1;min-width:0}
.mc-name{font-size:16px;font-weight:700;letter-spacing:-.02em}
.mc-role{font-size:12px;color:var(--t3);margin-top:2px}
.mc-status{font-size:12px;color:var(--t2);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-arrow{font-size:18px;color:var(--t4);flex-shrink:0}

.hub-updates{margin:24px 16px 0}
.sec-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.upd-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.upd-item:last-child{border-bottom:none}
.upd-dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
.ud-r{background:var(--red)}.ud-a{background:var(--amber)}.ud-b{background:var(--blue)}.ud-g{background:var(--green)}
.upd-txt{font-size:12px;color:var(--t2);line-height:1.55}
.upd-txt b{color:var(--t1);font-weight:600}
.hub-foot{text-align:center;font-size:10px;color:var(--t4);padding:28px 16px 24px;line-height:1.7}

/* ══════════════════════════════════════
   PERSON HEADER
══════════════════════════════════════ */
.p-hdr{padding:48px 20px 20px;border-bottom:1px solid var(--bd)}
.back-btn{
  display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;
  color:var(--t3);cursor:pointer;transition:color .15s;padding:4px 0;margin-bottom:14px;
}
.back-btn:hover{color:var(--t2)}
.back-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.p-name{font-size:26px;font-weight:700;letter-spacing:-.04em;line-height:1.15}
.p-sub{font-size:12px;font-weight:500;color:var(--t3);margin-top:3px;letter-spacing:.03em}
.p-stats{display:flex;gap:0;margin-top:18px}
.p-stat{flex:1;text-align:center;padding:0 4px}
.p-stat+.p-stat{border-left:1px solid var(--bd)}
.p-stat-v{font-size:15px;font-weight:700;color:var(--t2);letter-spacing:-.01em;line-height:1.2}
.p-stat-l{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

/* ══════════════════════════════════════
   CATEGORY ACCORDION
══════════════════════════════════════ */
.cats{padding:14px 16px 0;display:flex;flex-direction:column;gap:8px}
.cat-acc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-l);overflow:hidden;transition:border-color .15s}
.cat-acc:hover{border-color:rgba(255,255,255,.1)}
.cat-hdr{
  display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;
  position:relative;min-height:44px;user-select:none;
  transition:background .12s var(--ease);
}
.cat-hdr:active{background:var(--sf2)}
.cat-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0}
.cat-txt{flex:1;padding-left:4px;min-width:0}
.cat-n{font-size:14px;font-weight:600;letter-spacing:-.01em}
.cat-st{font-size:11px;font-weight:500;color:var(--t2);margin-top:2px}
.cat-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cat-score{font-size:26px;font-weight:800;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums}
.cat-chev{
  width:18px;height:18px;stroke:var(--t4);fill:none;stroke-width:2;stroke-linecap:round;
  transition:transform .25s var(--ease);flex-shrink:0;
}
.cat-acc.open .cat-chev{transform:rotate(180deg)}

/* Accordion body — CSS grid trick, no max-height jank */
.cat-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s var(--ease)}
.cat-acc.open .cat-body{grid-template-rows:1fr}
.cat-inner{overflow:hidden}

.cat-summary{
  padding:10px 16px 10px 23px;font-size:12px;color:var(--t2);line-height:1.55;
  border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);
}

/* ══════════════════════════════════════
   FINDINGS
══════════════════════════════════════ */
.finding{
  padding:14px 16px 14px 23px;border-bottom:1px solid var(--bd);cursor:pointer;
  transition:background .12s var(--ease);position:relative;overflow:hidden;
}
.finding::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.finding:last-child{border-bottom:none}
.finding:active{background:var(--sf2)}
.f-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.f-gene{
  font-family:'SF Mono',SFMono-Regular,'Fira Code',monospace;
  font-size:11px;font-weight:600;letter-spacing:.04em;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);
  padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;
}
.f-dot{width:7px;height:7px;border-radius:50%;margin-top:3px;flex-shrink:0}
.fd-r{background:var(--red)}.fd-a{background:var(--amber)}.fd-g{background:var(--green)}.fd-p{background:var(--purple)}
.f-n{font-size:13px;font-weight:600;margin-top:5px;letter-spacing:-.01em;line-height:1.3}
.f-l{font-size:12px;color:var(--t2);margin-top:5px;line-height:1.65}
.f-exp{max-height:0;overflow:hidden;transition:max-height .3s var(--ease)}
.f-exp.open{max-height:400px}
.f-detail{padding:8px 0 2px;font-size:12px;color:var(--t2);line-height:1.6}
.f-detail b{color:var(--t1);font-weight:600}

/* Colour modifiers */
.f-red::before{background:var(--red)}.f-red .f-gene{color:var(--red)}
.f-amb::before{background:var(--amber)}.f-amb .f-gene{color:var(--amber)}
.f-grn::before{background:var(--green)}.f-grn .f-gene{color:var(--green)}
.f-pur::before{background:var(--purple)}.f-pur .f-gene{color:var(--purple)}
.f-blu::before{background:var(--blue)}.f-blu .f-gene{color:var(--blue)}

.actions-box{padding:12px 16px;background:rgba(255,255,255,.02);border-top:1px solid var(--bd)}
.act-lbl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.act-item{display:flex;gap:9px;font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:7px}
.act-item:last-child{margin-bottom:0}
.act-n{font-size:10px;font-weight:700;color:var(--t4);min-width:14px}

/* ══════════════════════════════════════
   TRACKING
══════════════════════════════════════ */
.track-hdr{padding:20px 20px 6px;display:flex;align-items:baseline;justify-content:space-between}
.track-t{font-size:16px;font-weight:700;letter-spacing:-.02em}
.track-tabs{display:flex;gap:6px;padding:0 16px 14px}
.tbtn{
  padding:8px 14px;font-size:12px;font-weight:600;border-radius:var(--r-s);
  background:var(--sf2);border:1px solid var(--bd);color:var(--t2);
  transition:background .15s,border-color .15s,color .15s,transform .1s var(--spring);
  min-height:36px;white-space:nowrap;
}
.tbtn:active{transform:scale(.96)}
.tbtn.on{background:var(--grn-d);border-color:var(--grn-b);color:var(--green)}

.track-body>div{padding:0 16px 8px}
.ic{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-m);padding:14px 16px;margin-bottom:8px}
.ic-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ic-t{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.ic-gene{font-size:9px;font-weight:700;padding:2px 6px;border:1px solid var(--bd);border-radius:4px;letter-spacing:.04em;color:var(--t3)}
.ic-gene.g-red{color:var(--red);border-color:var(--red-b)}
.st{width:6px;height:6px;border-radius:50%;display:inline-block}
.st-r{background:var(--red)}.st-a{background:var(--amber)}.st-g{background:var(--green)}
.ic-last{font-size:10px;color:var(--t3);margin-top:1px}
.inp-row{display:flex;gap:8px;align-items:center}
.inp{
  flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r-s);
  padding:10px 12px;font-size:13px;font-weight:500;color:var(--t1);
  transition:border-color .15s;min-height:44px;-moz-appearance:textfield;
}
.inp:focus{border-color:var(--t3)}
.inp::placeholder{color:var(--t4)}
.inp[type=date]{color-scheme:dark}
.inp[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.inp-u{font-size:10px;font-weight:600;color:var(--t3);min-width:30px}
.ibtn{
  padding:10px 12px;font-size:12px;font-weight:700;border-radius:var(--r-s);
  background:var(--sf2);border:1px solid var(--bd);color:var(--t2);
  transition:background .15s,transform .1s var(--spring);min-height:44px;white-space:nowrap;
}
.ibtn:active{transform:scale(.96)}
.ibtn.p{background:var(--grn-d);border-color:var(--grn-b);color:var(--green)}
.opt-r{font-size:9px;color:var(--t3);margin-top:4px;font-weight:500}
.spark{height:32px;display:flex;align-items:flex-end;gap:2px;margin-top:8px}
.spark-b{flex:1;border-radius:2px 2px 0 0;min-width:3px;max-width:12px;transition:height .3s var(--ease)}

.med{display:flex;align-items:flex-start;gap:12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-m);padding:14px 16px;margin-bottom:8px}
.med-bar{width:3px;min-height:36px;border-radius:2px;flex-shrink:0;margin-top:2px}
.med-b{flex:1;min-width:0}
.med-n{font-size:13px;font-weight:600}
.med-d{font-size:10px;color:var(--t3);margin-top:2px}
.med-w{font-size:11px;color:var(--t2);margin-top:4px;line-height:1.45}
.med-rm{font-size:16px;color:var(--t4);padding:4px 8px;cursor:pointer;transition:color .15s;align-self:flex-start}
.med-rm:hover{color:var(--t2)}

.chk{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd)}
.chk:last-child{border-bottom:none}
.chk-box{
  width:20px;height:20px;border-radius:6px;border:2px solid var(--t4);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s var(--spring);flex-shrink:0;margin-top:1px;
}
.chk-box.on{background:var(--green);border-color:var(--green)}
.chk-box svg{width:11px;height:11px;stroke:var(--bg);stroke-width:3;fill:none;opacity:0;transition:opacity .15s}
.chk-box.on svg{opacity:1}
.chk-lbl{font-size:12px;font-weight:500;color:var(--t2);transition:opacity .2s;line-height:1.4}
.chk-lbl.off{opacity:.3;text-decoration:line-through}
.chk-sub{font-size:10px;color:var(--t3);margin-top:1px}

.sched-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-m);padding:14px 16px;margin-bottom:8px}
.sched-q{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px}
.sched-i{font-size:12px;color:var(--t2);line-height:1.6;padding-left:10px;border-left:2px solid var(--bd);margin-bottom:3px}

/* ══════════════════════════════════════
   DOCTOR CARD
══════════════════════════════════════ */
.doc-view{background:#fff;min-height:calc(100vh - 56px)}
.doc-hdr{padding:32px 22px 20px;border-bottom:2px solid #EAEAEA}
.doc-facility{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.doc-pname{font-size:24px;font-weight:800;color:#0A0A0B;letter-spacing:-.03em}
.doc-dob{font-size:13px;color:#6B7280;margin-top:3px}
.doc-date{font-size:11px;color:#9CA3AF;margin-top:2px}
.doc-badge{
  display:inline-flex;align-items:center;margin-top:10px;
  font-size:9px;font-weight:800;color:#fff;background:#C0392B;
  padding:3px 9px;border-radius:4px;letter-spacing:.06em;
}
.doc-body{padding:0 22px 32px}
.doc-sec{margin-top:24px}
.doc-sec-t{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.1em;padding-bottom:9px;border-bottom:1px solid #EAEAEA;margin-bottom:12px}
.doc-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #F8F8F8;font-size:12px}
.doc-row:last-child{border-bottom:none}
.doc-rl{color:#6B7280;font-weight:500}
.doc-rv{font-weight:600;color:#1F2937;text-align:right;max-width:60%}
.doc-rv.alert{color:#C0392B;font-weight:700}
.doc-alert{background:#FEF5F5;border:1.5px solid #F5D5D5;border-radius:var(--r-s);padding:12px 14px;margin-top:8px}
.doc-alert-t{font-size:9px;font-weight:800;color:#C0392B;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.doc-alert-i{font-size:11px;color:#7A2020;line-height:1.6;margin-bottom:2px}
.doc-alert-i:last-child{margin-bottom:0}
.doc-ok{background:#F0FFF8;border:1.5px solid #A3E4C7;border-radius:var(--r-s);padding:12px 14px;margin-top:8px}
.doc-ok-t{font-size:9px;font-weight:800;color:#059669;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.doc-ok-i{font-size:11px;color:#065F46;line-height:1.6;margin-bottom:2px}
.doc-ok-i:last-child{margin-bottom:0}
.print-btn{
  display:flex;align-items:center;justify-content:center;
  gap:8px;background:#111827;color:#fff;border:none;padding:11px 20px;
  border-radius:var(--r-s);font-size:13px;font-weight:700;font-family:inherit;
  cursor:pointer;margin:20px 22px 0;min-height:44px;width:calc(100% - 44px);
  transition:opacity .15s;
}
.print-btn:hover{opacity:.85}

/* ══════════════════════════════════════
   GENETICS / EXPLORE
══════════════════════════════════════ */
.gen-hdr{padding:20px 20px 12px}
.gen-t{font-size:16px;font-weight:700;letter-spacing:-.02em}
.gen-s{font-size:11px;color:var(--t3);margin-top:2px}
#d3-box{width:100%;height:calc(100vh - 210px);min-height:380px}
#d3-box svg{width:100%;height:100%}
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:8px 16px 16px}
.leg-c{font-size:9px;font-weight:600;color:var(--t3);display:flex;align-items:center;gap:5px}
.leg-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

/* ══════════════════════════════════════
   MORE / PENDING
══════════════════════════════════════ */
.more-item{
  display:flex;align-items:center;gap:14px;background:var(--sf);border:1px solid var(--bd);
  border-radius:var(--r-m);padding:14px 16px;margin-bottom:8px;cursor:pointer;
  transition:background .15s;
}
.more-item:active{background:var(--sf3)}
.more-ic{width:38px;height:38px;border-radius:var(--r-s);background:var(--sf2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.more-ic svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:1.8}
.more-t{font-size:13px;font-weight:600}
.more-s{font-size:11px;color:var(--t3);margin-top:1px}

.pending-view{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;padding:48px 32px;text-align:center}
.pend-badge{width:52px;height:52px;border-radius:var(--r-l);background:var(--sf);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.pend-badge svg{width:24px;height:24px;stroke:var(--t3);fill:none;stroke-width:1.5}
.pend-t{font-size:18px;font-weight:700;letter-spacing:-.02em}
.pend-s{font-size:13px;color:var(--t2);margin-top:6px;line-height:1.6;max-width:260px}

/* ══════════════════════════════════════
   GAUGE
══════════════════════════════════════ */
.gauge-track{fill:none;stroke:var(--bd);stroke-width:8}
.gauge-avg{fill:none;stroke:var(--t4);stroke-width:2;stroke-dasharray:3 5}
.gauge-glow{fill:none;stroke-width:12;stroke-linecap:round;opacity:.12;filter:blur(5px);transition:stroke-dashoffset 1.1s var(--expo)}
.gauge-arc{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.1s var(--expo)}
.gauge-val{font-size:34px;font-weight:800;fill:var(--t1);letter-spacing:-.04em}
.gauge-lbl{font-size:9px;font-weight:600;fill:var(--t3);text-transform:uppercase;letter-spacing:.1em}

/* ══════════════════════════════════════
   FAMILY CONTEXT CARD
══════════════════════════════════════ */
.fhx{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-m);padding:14px 16px;margin-bottom:8px}
.fhx-rel{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.fhx-cond{font-size:13px;font-weight:600;margin-top:3px}
.fhx-body{font-size:12px;color:var(--t2);margin-top:4px;line-height:1.5}

/* ══════════════════════════════════════
   UTILITIES
══════════════════════════════════════ */
.sec{padding:20px 20px 10px;display:flex;align-items:baseline;justify-content:space-between}
.sec-t{font-size:14px;font-weight:700;letter-spacing:-.01em}
.sec-s{font-size:11px;font-weight:500;color:var(--t3)}
.pad{padding:0 16px}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:1px}

/* ══════════════════════════════════════
   LIFESPAN OPTIMIZER
══════════════════════════════════════ */
.ls-hero{padding:20px 16px 0}
.ls-compare{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-l);overflow:hidden;margin-bottom:12px}
.ls-compare-row{display:flex}
.ls-col{flex:1;padding:18px 16px;text-align:center;position:relative}
.ls-col+.ls-col{border-left:1px solid var(--bd)}
.ls-col-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.ls-col-num{font-size:38px;font-weight:800;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums}
.ls-col-unit{font-size:11px;font-weight:500;color:var(--t3);margin-top:3px}
.ls-live{background:linear-gradient(135deg,rgba(91,139,212,.12) 0%,rgba(155,122,219,.08) 100%);border-top:1px solid var(--bd);padding:16px;text-align:center}
.ls-live-n{font-size:54px;font-weight:800;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,var(--blue) 0%,var(--purple) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;transition:all .3s var(--expo)}
.ls-live-lbl{font-size:11px;font-weight:500;color:var(--t3);margin-top:4px}
.ls-gain{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(90,173,139,.1);border:1px solid rgba(90,173,139,.25);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--green)}

.ls-variants{padding:0 16px 12px}
.ls-var-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.ls-var-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px}
.ls-var-row:last-child{border-bottom:none}
.ls-var-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ls-var-name{flex:1;color:var(--t2)}
.ls-var-delta{font-weight:700;font-variant-numeric:tabular-nums;min-width:40px;text-align:right}

.ls-sliders{padding:0 16px 8px}
.ls-sl-hdr{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;margin-top:16px}
.ls-sl{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-m);padding:14px 16px;margin-bottom:8px}
.ls-sl-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.ls-sl-name{font-size:13px;font-weight:600}
.ls-sl-gain{font-size:12px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;min-width:48px;text-align:right}
.ls-sl-gene{font-size:10px;font-weight:600;color:var(--t3);margin-bottom:8px}
.ls-sl-insight{font-size:11px;color:var(--t2);line-height:1.6;margin-top:6px;padding-top:8px;border-top:1px solid var(--bd)}
.ls-range{width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer;-webkit-appearance:none;background:var(--bd);accent-color:var(--blue)}
.ls-range::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:0 0 0 4px rgba(91,139,212,.15)}
.ls-range::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--blue);cursor:pointer;border:none}
.ls-range-row{display:flex;align-items:center;gap:10px}
.ls-range-val{font-size:11px;font-weight:700;color:var(--t2);min-width:52px;text-align:right;font-variant-numeric:tabular-nums}

.ls-decade{background:var(--sf);border:1px solid var(--bd);border-left:3px solid;border-radius:var(--r-m);padding:16px;margin-bottom:8px}
.ls-dec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.ls-dec-title{font-size:15px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.ls-dec-body{font-size:12px;color:var(--t2);line-height:1.65;margin-bottom:10px}
.ls-dec-action{font-size:11px;color:var(--t2);padding:4px 0;display:flex;gap:8px;align-items:flex-start}
.ls-dec-action::before{content:'→';color:var(--t3);flex-shrink:0;margin-top:1px}

.ls-cite{padding:16px 16px 28px;font-size:10px;color:var(--t4);line-height:1.7}
.ls-cite b{color:var(--t3)}

/* ══════════════════════════════════════
   CONVERSATIONAL LOG INPUT
══════════════════════════════════════ */
.clog-wrap{padding:12px 16px 4px}
.clog-row{display:flex;gap:8px;align-items:flex-end}
.clog-inp{
  flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-m);
  padding:12px 14px;font-size:13px;font-weight:500;color:var(--t1);min-height:44px;
  resize:none;overflow:hidden;line-height:1.5;transition:border-color .25s;font-family:inherit;
}
.clog-inp:focus{border-color:var(--blue);outline:none}
.clog-inp::placeholder{color:var(--t4)}
.clog-send{
  width:44px;height:44px;border-radius:var(--r-m);background:var(--blue);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,transform .15s var(--spring);
}
.clog-send:active{opacity:.8;transform:scale(.93)}
.clog-send svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.clog-chips{display:flex;gap:6px;padding:8px 16px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.clog-chips::-webkit-scrollbar{display:none}
.cchip{
  padding:6px 12px;font-size:11px;font-weight:600;border-radius:20px;background:var(--sf);
  border:1px solid var(--bd);color:var(--t3);white-space:nowrap;transition:all .15s;min-height:32px;
}
.cchip:active{transform:scale(.95)}
.cchip.lab{border-color:var(--blu-b);color:var(--blue);background:var(--blu-d)}
.cchip.med{border-color:var(--grn-b);color:var(--green);background:var(--grn-d)}
.cchip.visit{border-color:var(--pur-b);color:var(--purple);background:var(--pur-d)}
.cchip.note{border-color:var(--amb-b);color:var(--amber);background:var(--amb-d)}
.clog-fb{font-size:11px;color:var(--green);padding:0 16px 8px;min-height:18px;transition:opacity .3s}

/* ══════════════════════════════════════
   WEARABLE DATA
══════════════════════════════════════ */
.wear-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-m);padding:14px 16px;margin-bottom:8px}
.wear-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.wear-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.wear-icon{width:28px;height:28px;border-radius:8px;background:var(--sf2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wear-icon svg{width:14px;height:14px;stroke:var(--t2);fill:none;stroke-width:2;stroke-linecap:round}
.wear-last{font-size:10px;color:var(--t3);margin-top:1px}
.wear-target{font-size:9px;font-weight:700;color:var(--t3);padding:2px 7px;border:1px solid var(--bd);border-radius:4px}
.wear-ctx{font-size:11px;color:var(--t2);line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}
.wear-ctx b{color:var(--t1)}
.wear-dna{font-size:9px;font-weight:700;font-family:'SF Mono',SFMono-Regular,'Fira Code',monospace;color:var(--t3);margin-bottom:3px;letter-spacing:.04em;text-transform:uppercase}

/* ══════════════════════════════════════
   JOURNAL TIMELINE
══════════════════════════════════════ */
.jrnl-empty{text-align:center;padding:48px 24px;color:var(--t3);font-size:13px;line-height:1.65}
.jrnl-date-group{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:12px 0 6px}
.jrnl-entry{
  background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-m);
  padding:13px 38px 13px 16px;margin-bottom:8px;position:relative;overflow:hidden;
}
.jrnl-entry::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.jrnl-entry.t-lab::before{background:var(--blue)}
.jrnl-entry.t-med::before{background:var(--green)}
.jrnl-entry.t-visit::before{background:var(--purple)}
.jrnl-entry.t-symptom::before{background:var(--amber)}
.jrnl-entry.t-note::before{background:var(--t3)}
.jrnl-meta{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.jrnl-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase}
.jrnl-badge.t-lab{background:var(--blu-d);color:var(--blue);border:1px solid var(--blu-b)}
.jrnl-badge.t-med{background:var(--grn-d);color:var(--green);border:1px solid var(--grn-b)}
.jrnl-badge.t-visit{background:var(--pur-d);color:var(--purple);border:1px solid var(--pur-b)}
.jrnl-badge.t-symptom{background:var(--amb-d);color:var(--amber);border:1px solid var(--amb-b)}
.jrnl-badge.t-note{background:rgba(255,255,255,.04);color:var(--t3);border:1px solid var(--bd)}
.jrnl-time{font-size:10px;color:var(--t4)}
.jrnl-text{font-size:13px;color:var(--t1);font-weight:500;line-height:1.5}
.jrnl-parsed{font-size:11px;color:var(--t3);margin-top:3px}
.jrnl-del{position:absolute;top:10px;right:10px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t4);cursor:pointer;transition:color .15s;border-radius:4px}
.jrnl-del:hover{color:var(--t2);background:var(--sf2)}

/* ══════════════════════════════════════

function renderLifespan(p){
  const ld=LIFESPAN[p.id];
  if(!ld){

  const maxPossible=Math.round(geneticBase+maxGain);
  const currentGain=calcLifespanGain(ld);
  const currentEst=Math.round(geneticBase+currentGain);

  let h=`<div class="ls-hero">`;

  // Compare banner
  h+=`<div class="ls-compare">

      <div class="ls-col"><div class="ls-col-lbl">Full optimization</div><div class="ls-col-num" style="color:var(--green)">${maxPossible}</div><div class="ls-col-unit">years</div></div>
    </div>
    <div class="ls-live">
      <div class="ls-col-lbl" style="margin-bottom:8px">Your current estimated lifespan</div>
      <div class="ls-live-n" id="ls-live-num-${p.id}">${currentEst}</div>
      <div class="ls-live-lbl">years — adjust sliders to see your potential</div>
      <div class="ls-gain" id="ls-gain-${p.id}">+${Math.round(currentGain)} years from lifestyle</div>
    </div>
  </div>`;

  // Genetic variant breakdown
  h+=`</div><div class="ls-variants">
    <div class="ls-var-lbl">Your genetic starting point</div>
    <div class="ls-var-row"><div class="ls-var-dot" style="background:var(--t3)"></div><div class="ls-var-name">US average lifespan baseline</div><div class="ls-var-delta" style="color:var(--t2)">+${ld.base}</div></div>`;
  ld.variants.forEach(v=>{
    h+=`<div class="ls-var-row"><div class="ls-var-dot" style="background:${v.c}"></div><div class="ls-var-name">${v.n}</div><div class="ls-var-delta" style="color:${v.c}">${v.y > 0 ? '+' : ''}${v.y} yr</div></div>`;
  });
  h+=`<div class="ls-var-row" style="border-top:1px solid var(--bd);margin-top:4px;padding-top:8px"><div class="ls-var-dot" style="background:var(--blue)"></div><div class="ls-var-name" style="font-weight:600;color:var(--t1)">Genetic baseline</div><div class="ls-var-delta" style="color:var(--blue);font-size:14px">${geneticBase} yr</div></div>
  </div>`;

  // Sliders
  h+=`<div class="ls-sliders"><div class="ls-sl-hdr">Your lifestyle levers — drag to update</div>`;
  ld.sliders.forEach(sl=>{
    const gain=calcSliderGain(sl);
    const displayVal=sl.isBool?(sl.val?'On':'Off'):(sl.val+(sl.unit&&sl.unit!=='on/off'?' '+sl.unit:''));
    h+=`<div class="ls-sl">
      <div class="ls-sl-top">
        <div><div class="ls-sl-name">${sl.l}</div><div class="ls-sl-gene">${sl.gene}</div></div>
        <div class="ls-sl-gain" id="ls-sg-${p.id}-${sl.id}">+${gain.toFixed(1)} yr</div>
      </div>
      <div class="ls-range-row">
        <input class="ls-range" type="range" min="${sl.min}" max="${sl.max}" step="${sl.isBool?1:sl.id==='vitd'||sl.id==='diet'?sl.id==='diet'?5:5:sl.id==='sleep'?0.5:sl.id==='omega3'?0.25:sl.id==='exercise'?0.5:1}" value="${sl.val}"
          oninput="updateLifespan('${p.id}','${sl.id}',parseFloat(this.value))">
        <div class="ls-range-val" id="ls-rv-${p.id}-${sl.id}">${displayVal}</div>
      </div>
      <div class="ls-sl-insight">${sl.insight}</div>
    </div>`;
  });
  h+=`</div>`;

  // Decade roadmap
  h+=`<div class="ls-sliders"><div class="ls-sl-hdr">Your decade-by-decade roadmap</div>`;
  ld.decades.forEach(d=>{
    h+=`<div class="ls-decade" style="border-left-color:${d.c}">
      <div class="ls-dec-lbl" style="color:${d.c}">${d.label}</div>
      <div class="ls-dec-title">${d.title}</div>
      <div class="ls-dec-body">${d.body}</div>
      ${d.actions.map(a=>`<div class="ls-dec-action">${a}</div>`).join('')}
    </div>`;
  });
  h+=`</div>`;

  // Citations
  h+=`<div class="ls-cite"><b>Evidence base:</b> EXERT trial (Alzheimer's Res. & Therapy 2024) · INTERHEART (Lancet 2004) · PREDIMED (NEJM 2013) · VITALITY trial (NEJM 2019) · U.S. POINTER (JAMA 2025) · Walker sleep research (UCSF) · ARIC study · USPSTF screening outcomes. Year estimates are illustrative life-expectancy adjustments based on population-level studies. Not a clinical prediction.</div>`;

  return h;
}

function calcSliderGain(sl){
  if(sl.isBool) return sl.val * sl.maxGain;
  if(sl.inv){
    // lower value = more gain (stress, alcohol)
    return (1-(sl.val-sl.min)/(sl.max-sl.min))*sl.maxGain;
  }
  // for sleep: optimal at 8h, penalty outside range
  if(sl.id==='sleep'){
    const opt=8, v=parseFloat(sl.val);
    const frac=v<=opt?Math.max(0,(v-sl.min)/(opt-sl.min)):Math.max(0,1-(v-opt)/2);
    return frac*sl.maxGain;
  }
  return ((sl.val-sl.min)/(sl.max-sl.min))*sl.maxGain;
}

function calcLifespanGain(ld){
  return ld.sliders.reduce((s,sl)=>s+calcSliderGain(sl),0);
}

function updateLifespan(pid,slid,val){
  const ld=LIFESPAN[pid];if(!ld)return;
  const sl=ld.sliders.find(s=>s.id===slid);if(!sl)return;
  sl.val=val;
  const gain=calcSliderGain(sl);
  const gainEl=document.getElementById('ls-sg-'+pid+'-'+slid);
  if(gainEl)gainEl.textContent='+'+gain.toFixed(1)+' yr';
  const rvEl=document.getElementById('ls-rv-'+pid+'-'+slid);
  if(rvEl)rvEl.textContent=sl.isBool?(val?'On':'Off'):(val+(sl.unit&&sl.unit!=='on/off'?' '+sl.unit:''));
  const totalGain=calcLifespanGain(ld);
  const geneticBase=ld.base+ld.geneticAdj;
  const est=Math.round(geneticBase+totalGain);
  const liveEl=document.getElementById('ls-live-num-'+pid);
  if(liveEl)liveEl.textContent=est;
  const gainBadge=document.getElementById('ls-gain-'+pid);
  if(gainBadge)gainBadge.textContent='+'+Math.round(totalGain)+' years from lifestyle';
}

function initD3(p){
  if(_d3init[p.id])return;_d3init[p.id]=true;
  const box=document.getElementById('d3-box');if(!box)return;
  const w=box.clientWidth||375,h=box.clientHeight||400;
  const svg=d3.select(box).append('svg').attr('viewBox',`0 0 ${w} ${h}`);
  const cats=p.d3cats;
  const nodes=[],links=[];let id=0;
  const ctr={id:id++,n:p.name.split(' ')[0],g:'center',r:16,c:p.color};
  nodes.push(ctr);
  for(const[cat,data]of Object.entries(cats)){
    const hub={id:id++,n:cat,g:cat,r:10,c:data.c,hub:1};
    nodes.push(hub);links.push({source:ctr.id,target:hub.id});
    data.n.forEach(nm=>{
      const nd={id:id++,n:nm,g:cat,r:4,c:data.c};
      nodes.push(nd);links.push({source:hub.id,target:nd.id});
    });
  }
  const sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>d.source.hub||d.target.hub?65:30))
    .force('charge',d3.forceManyBody().strength(-35))
    .force('center',d3.forceCenter(w/2,h/2))
    .force('collision',d3.forceCollide().radius(d=>d.r+3));
  const link=svg.selectAll('line').data(links).join('line').attr('stroke','rgba(255,255,255,.04)').attr('stroke-width',1);
  const node=svg.selectAll('circle').data(nodes).join('circle').attr('r',d=>d.r).attr('fill',d=>d.c).attr('opacity',d=>d.n===p.name.split(' ')[0]?.9:d.hub?.65:.38).style('cursor','pointer');
  node.append('title').text(d=>d.n);
  const label=svg.selectAll('text').data(nodes.filter(d=>d.hub||d.n===p.name.split(' ')[0])).join('text')
    .text(d=>d.n).attr('text-anchor','middle').attr('dy',d=>d.r+11)
    .attr('font-size','8px').attr('fill','rgba(255,255,255,.32)').attr('font-weight','600')
    .attr('font-family','-apple-system,BlinkMacSystemFont,sans-serif');
  sim.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('cx',d=>d.x).attr('cy',d=>d.y);
    label.attr('x',d=>d.x).attr('y',d=>d.y);
  });
  node.call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
    .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));
  const leg=document.getElementById('d3-legend');
  if(leg){
    for(const[cat,data]of Object.entries(cats)){
      leg.innerHTML+=`<div class="leg-c"><span class="leg-dot" style="background:${data.c}"></span>${cat}</div>`;
    }
  }
}

        <button class="ibtn p" onclick="saveWearable('${p.id}','${m.k}')">Save</button>
      </div>
      ${hist.length?`<div class="spark" id="wsp-${p.id}-${m.k}">${renderWearSpark(hist,m)}</div>`:''}
      <div class="wear-ctx">${m.ctx}</div>
    </div>`;
  });
  c.innerHTML=h;
  metrics.forEach(m=>{
    const de=document.getElementById('wd-'+p.id+'-'+m.k);if(de)de.valueAsDate=new Date();
  });
}

function renderWearSpark(hist,m){
  if(!hist.length)return'';
  const vals=hist.slice(-14).map(x=>x.v);
  const mx=Math.max(...vals)*1.2||100;
  return vals.map(v=>{
    const pct=Math.max(6,v/mx*100);
    const good=m.k==='steps'?v>=m.lo:v>=m.lo&&v<=m.hi;
    const cl=good?'var(--green)':'var(--amber)';
    return `<div class="spark-b" style="height:${pct}%;background:${cl}"></div>`;
  }).join('');
}

function saveWearable(pid,k){
  const v=parseFloat(document.getElementById('wv-'+pid+'-'+k).value);
  const d=document.getElementById('wd-'+pid+'-'+k).value;
  if(!v||!d)return;
  const h=ls(pid,'w-'+k,[]);h.push({v,d});h.sort((a,b)=>a.d.localeCompare(b.d));
  lw(pid,'w-'+k,h);
  document.getElementById('wv-'+pid+'-'+k).value='';
  renderWearables(PERSONS[pid]);
}

/* ══════════════════════════════════════
   CONVERSATIONAL LOG + JOURNAL
══════════════════════════════════════ */
const LAB_PATTERNS=[
  {re:/(?:my\s+)?ldl\s*(?:cholesterol)?\s*(?:was|is|came\s+back(?:\s+at)?|came\s+in(?:\s+at)?|is\s+now|:)?\s*([\d.]+)/i,k:'ldl',n:'LDL Cholesterol',u:'mg/dL'},
  {re:/(?:my\s+)?hdl\s*(?:cholesterol)?\s*(?:was|is|came\s+back(?:\s+at)?)?\s*([\d.]+)/i,k:'hdl',n:'HDL Cholesterol',u:'mg/dL'},
  {re:/(?:my\s+)?(?:vitamin\s+d|vit\.?\s*d|vitd)\s*(?:was|is|came\s+back(?:\s+at)?|level)?\s*([\d.]+)/i,k:'vitd',n:'Vitamin D',u:'ng/mL'},
  {re:/(?:my\s+)?testosterone\s*(?:was|is|came\s+back(?:\s+at)?)?\s*([\d.]+)/i,k:'testo',n:'Testosterone',u:'ng/dL'},
  {re:/(?:my\s+)?ferritin\s*(?:was|is|came\s+back(?:\s+at)?)?\s*([\d.]+)/i,k:'ferritin',n:'Ferritin',u:'ng/mL'},
  {re:/(?:my\s+)?(?:b-?12|vitamin\s+b-?12)\s*(?:was|is|came\s+back(?:\s+at)?)?\s*([\d.]+)/i,k:'b12',n:'Vitamin B12',u:'pg/mL'},
  {re:/(?:my\s+)?(?:hba1c|a1c|hemoglobin\s+a1c)\s*(?:was|is|came\s+back(?:\s+at)?)?\s*([\d.]+)/i,k:'a1c',n:'HbA1c',u:'%'},
  {re:/(?:my\s+)?(?:crp|c-reactive\s+protein)\s*(?:was|is|came\s+back(?:\s+at)?)?\s*([\d.]+)/i,k:'crp',n:'CRP',u:'mg/L'},
  {re:/(?:my\s+)?(?:homocysteine|hcy)\s*(?:was|is|came\s+back(?:\s+at)?)?\s*([\d.]+)/i,k:'hcy',n:'Homocysteine',u:'µmol/L'},
  {re:/(?:my\s+)?(?:apob|apo\s*b)\s*(?:was|is|came\s+back(?:\s+at)?)?\s*([\d.]+)/i,k:'apob',n:'ApoB',u:'mg/dL'},
  {re:/weight\s+([\d.]+)\s*(?:lbs?|pounds?)?/i,k:'weight',n:'Weight',u:'lbs'},
  {re:/(?:blood\s+pressure|bp)\s+([\d]+)\s*[\/\-]\s*([\d]+)/i,k:'bp',n:'Blood Pressure',u:'mmHg',isBP:true},
];

function parseHealthLog(text){
  const today=new Date().toISOString().slice(0,10);
  const lower=text.toLowerCase().trim();
  // Try lab patterns
  for(const p of LAB_PATTERNS){
    const m=text.match(p.re);
    if(m){
      const v=p.isBP?m[1]+'/'+m[2]:parseFloat(m[1]);
      return {type:'lab',parsed:{k:p.k,n:p.n,v,u:p.u},date:extractDate(text)||today};
    }
  }
  // Visit patterns
  if(/(?:saw|visited|appointment|dr\.|doctor|went\s+to)/i.test(lower))
    return {type:'visit',parsed:null,date:extractDate(text)||today};
  // Med patterns
  if(/(?:started?|began|taking|now\s+on|added|stopped?|discontinued|increased|decreased)\s+\w/i.test(lower))
    return {type:'med',parsed:null,date:extractDate(text)||today};
  // Symptom patterns
  if(/(?:feeling|feel|symptom|tired|fatigue|pain|dizzy|nausea|headache|ache)/i.test(lower))
    return {type:'symptom',parsed:null,date:extractDate(text)||today};
  return {type:'note',parsed:null,date:extractDate(text)||today};
}

function extractDate(text){
  const m=text.match(/(\d{4}-\d{2}-\d{2})/);if(m)return m[1];
  const today=new Date();
  if(/\btoday\b/i.test(text))return today.toISOString().slice(0,10);
  if(/\byesterday\b/i.test(text)){const y=new Date(today);y.setDate(y.getDate()-1);return y.toISOString().slice(0,10);}
  return null;
}

function setLogChip(pid,prefix){
  const inp=document.getElementById('clog-'+pid);if(!inp)return;
  inp.value=prefix;inp.focus();
  inp.style.height='auto';inp.style.height=inp.scrollHeight+'px';
}

function submitLog(pid){
  const inp=document.getElementById('clog-'+pid);if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  const parsed=parseHealthLog(text);
  // Save to journal
  const journal=ls(pid,'journal',[]);
  const entry={id:Date.now(),type:parsed.type,text,parsed:parsed.parsed,date:parsed.date,ts:Date.now()};
  journal.unshift(entry);
  lw(pid,'journal',journal);
  // Also save to lab tracker if it's a lab
  if(parsed.type==='lab'&&parsed.parsed&&parsed.parsed.k&&!parsed.parsed.isBP){
    const hist=ls(pid,'l-'+parsed.parsed.k,[]);
    hist.push({v:parseFloat(parsed.parsed.v),d:parsed.date});
    hist.sort((a,b)=>a.d.localeCompare(b.d));
    lw(pid,'l-'+parsed.parsed.k,hist);
  }
  // Show feedback
  const fb=document.getElementById('clog-fb-'+pid);
  if(fb){
    const labels={lab:'Lab result saved',med:'Medication logged',visit:'Visit recorded',symptom:'Symptom noted',note:'Note saved'};
    fb.textContent=labels[parsed.type]||'Saved';
    fb.style.opacity='1';
    setTimeout(()=>{fb.style.opacity='0';},2000);
  }
  inp.value='';inp.style.height='auto';
  // If journal tab is open, refresh it
  const jt=document.getElementById('tb-journal');
  if(jt&&jt.style.display!=='none')renderJournal(PERSONS[pid]);
}

function renderJournal(p){
  const c=document.getElementById('tb-journal');if(!c)return;
  const journal=ls(p.id,'journal',[]);
  if(!journal.length){
    c.innerHTML='<div class="jrnl-empty">Nothing logged yet.<br><span style="font-size:11px;color:var(--t4)">Type anything above — "My LDL was 142 today" or "Saw Dr. Tung, discussed cholestyramine"</span></div>';
    return;
  }
  // Group by date
  const byDate={};
  journal.forEach(e=>{(byDate[e.date]=byDate[e.date]||[]).push(e);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  c.innerHTML=dates.map(d=>{
    const label=d===new Date().toISOString().slice(0,10)?'Today':
                 d===new Date(Date.now()-86400000).toISOString().slice(0,10)?'Yesterday':
                 new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    return `<div class="jrnl-date-group">${label}</div>`+
      byDate[d].map((e,i)=>{
        const idx=journal.indexOf(e);
        return `<div class="jrnl-entry t-${e.type}">
          <div class="jrnl-meta"><span class="jrnl-badge t-${e.type}">${e.type}</span><span class="jrnl-time">${new Date(e.ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</span></div>
          <div class="jrnl-text">${e.text}</div>
          ${e.parsed?`<div class="jrnl-parsed">Logged: ${e.parsed.n} = ${e.parsed.v} ${e.parsed.u}</div>`:''}
          <div class="jrnl-del" onclick="deleteJournalEntry('${p.id}',${idx})">×</div>
        </div>`;
      }).join('');
  }).join('');
}

function deleteJournalEntry(pid,idx){
  const journal=ls(pid,'journal',[]);
  journal.splice(idx,1);
  lw(pid,'journal',journal);
  renderJournal(PERSONS[pid]);
}

function renderLabs(p){
  const c=document.getElementById('tb-labs');if(!c)return;c.innerHTML='';
  p.labs.forEach(lab=>{
    const hist=ls(p.id,'l-'+lab.k,[]);const last=hist.length?hist[hist.length-1]:null;
    let sc='',sv='No data';
    if(last){const v=last.v;sc=v>lab.hi?'st-r':v<lab.lo?'st-a':'st-g';sv=v+' '+lab.u;}
    let h=`<div class="ic"><div class="ic-top"><div>`;
    h+=`<div class="ic-t"><span class="st ${sc}"></span>${lab.n}</div>`;
    if(last)h+=`<div class="ic-last">${sv} &middot; ${last.d}</div>`;
    h+=`</div>${lab.gene?`<div class="ic-gene ${lab.gc}">${lab.gene}</div>`:''}</div>`;
    h+=`<div class="inp-row">`;
    h+=`<input class="inp" type="number" id="lv-${p.id}-${lab.k}" placeholder="Value" step="any">`;
    h+=`<div class="inp-u">${lab.u}</div>`;
    h+=`<input class="inp" type="date" id="ld-${p.id}-${lab.k}" style="max-width:130px">`;
    h+=`<button class="ibtn" onclick="saveLab('${p.id}','${lab.k}')">Save</button></div>`;
    h+=`<div class="opt-r">Optimal: ${lab.lo}${lab.hi<999?'–'+lab.hi:'+'} ${lab.u}</div>`;
    h+=`<div class="spark" id="sp-${p.id}-${lab.k}"></div></div>`;
    c.innerHTML+=h;
    const de=document.getElementById('ld-'+p.id+'-'+lab.k);if(de)de.valueAsDate=new Date();
    renderSpark(p.id,lab.k,hist,lab.hi);
  });
}

function saveLab(pid,k){
  const v=parseFloat(document.getElementById('lv-'+pid+'-'+k).value);
  const d=document.getElementById('ld-'+pid+'-'+k).value;
  if(!v||!d)return;
  const h=ls(pid,'l-'+k,[]);h.push({v,d});h.sort((a,b)=>a.d.localeCompare(b.d));
  lw(pid,'l-'+k,h);document.getElementById('lv-'+pid+'-'+k).value='';
  renderLabs(PERSONS[pid]);
}

function renderSpark(pid,k,h,hi){
  const el=document.getElementById('sp-'+pid+'-'+k);if(!el||!h.length)return;
  const mx=Math.max(...h.map(x=>x.v))*1.2||100;
  el.innerHTML=h.slice(-14).map(x=>{
    const p2=Math.max(6,x.v/mx*100);const cl=x.v>hi?'var(--red)':'var(--green)';
    return `<div class="spark-b" style="height:${p2}%;background:${cl}"></div>`;
  }).join('');
}

function initMeds(p){
  const c=document.getElementById('tb-meds');if(!c)return;
  c.innerHTML=`<div class="ic" style="margin-bottom:12px"><div class="inp-row"><input class="inp" id="med-in-${p.id}" type="text" placeholder="Add medication..." list="med-dl-${p.id}">
  <datalist id="med-dl-${p.id}"></datalist>
  <button class="ibtn p" onclick="addMed('${p.id}')">Add</button></div></div>
  <div id="med-list-${p.id}"></div>`;
  const dl=document.getElementById('med-dl-'+p.id);
  if(dl)Object.keys(p.pgx||{}).forEach(k=>{const o=document.createElement('option');o.value=k.charAt(0).toUpperCase()+k.slice(1);dl.appendChild(o);});
  renderMeds(p);
}

function addMed(pid){
  const i=document.getElementById('med-in-'+pid);const n=i.value.trim();if(!n)return;
  const m=ls(pid,'meds',[]);m.push({n,d:new Date().toISOString().slice(0,10)});
  lw(pid,'meds',m);i.value='';renderMeds(PERSONS[pid]);
}

function removeMed(pid,i){
  const m=ls(pid,'meds',[]);m.splice(i,1);lw(pid,'meds',m);renderMeds(PERSONS[pid]);
}

function renderMeds(p){
  const el=document.getElementById('med-list-'+p.id);if(!el){initMeds(p);return;}
  const m=ls(p.id,'meds',[]);
  if(!m.length){el.innerHTML='<div style="text-align:center;color:var(--t3);font-size:13px;padding:32px 16px;line-height:1.65">No medications yet.<br><span style="font-size:11px;color:var(--t4)">Add one above and we\'ll show you what your genes say about it.</span></div>';return;}
  el.innerHTML=m.map((x,i)=>{
    const k=x.n.toLowerCase();const pg=(p.pgx||{})[k]||{s:'var(--t3)',w:'No PGx data available.',g:'Unknown'};
    return `<div class="med"><div class="med-bar" style="background:${pg.s}"></div><div class="med-b"><div class="med-n">${x.n}</div><div class="med-d">${x.d} &middot; ${pg.g}</div><div class="med-w">${pg.w}</div></div><div class="med-rm" onclick="removeMed('${p.id}',${i})">×</div></div>`;
  }).join('');
}

function initProto(p){
  const c=document.getElementById('tb-proto');if(!c)return;
  renderProto(p);
}

function renderProto(p){
  const c=document.getElementById('tb-proto');if(!c)return;
  const today=new Date().toISOString().slice(0,10);
  const checks=ls(p.id,'chk-'+today,{});
  let h=`<div class="ic"><div class="ic-top"><div class="ic-t">Daily Protocol</div><div id="proto-prog-${p.id}" style="font-size:11px;color:var(--t3)">${Object.values(checks).filter(Boolean).length}/${p.protocol.length}</div></div>`;
  p.protocol.forEach(pr=>{
    const on=checks[pr.id]||false;
    h+=`<div class="chk"><div class="chk-box${on?' on':''}" onclick="togProto('${p.id}','${pr.id}',this)"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="chk-lbl${on?' off':''}">${pr.l}</div><div class="chk-sub">${pr.r}</div></div></div>`;
  });
  h+=`</div>`;

  // Scheduling
  if(p.id==='chad'){
    h+=`<div class="ic" style="margin-top:4px"><div class="ic-t" style="margin-bottom:10px">Screening Schedule</div>
    <div class="sched-card"><div class="sched-q">Quarterly</div><div class="sched-i">Lipid panel + ApoB</div><div class="sched-i">B12 + MMA + homocysteine</div><div class="sched-i">Vitamin D 25(OH)D</div></div>
    <div class="sched-card"><div class="sched-q">Annually</div><div class="sched-i">Full-body dermatology + dermoscopy</div><div class="sched-i">EKG + echocardiogram</div><div class="sched-i">CAC score if not done</div></div></div>`;
  }
  if(p.id==='quinn'){
    h+=`<div class="ic" style="margin-top:4px"><div class="ic-t" style="margin-bottom:10px">Active Monitoring</div>
    <div class="sched-card"><div class="sched-q">8-week recheck</div><div class="sched-i">Testosterone (HPG recovery)</div><div class="sched-i">Lipid panel + ApoB</div><div class="sched-i">Morning cortisol (HPA axis)</div></div>
    <div class="sched-card"><div class="sched-q">Quarterly</div><div class="sched-i">CRP + ESR (BD activity)</div><div class="sched-i">Vitamin D (target 50-60)</div><div class="sched-i">Homocysteine + MMA</div></div></div>`;
  }
  c.innerHTML=h;
}

function togProto(pid,id,el){
  const today=new Date().toISOString().slice(0,10);
  const c=ls(pid,'chk-'+today,{});c[id]=!c[id];lw(pid,'chk-'+today,c);
  el.classList.toggle('on');
  const lbl=el.nextElementSibling;
  if(lbl){const lb=lbl.querySelector('.chk-lbl');if(lb)lb.classList.toggle('off');}
  const pg=document.getElementById('proto-prog-'+pid);
  if(pg){const p2=PERSONS[pid];pg.textContent=Object.values(c).filter(Boolean).length+'/'+(p2?p2.protocol.length:0);}
}

function renderDoctor(p){
  const d=p.doctor;
  const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  let h=`<div class="doc-view">
  <div class="doc-hdr">
    <div class="doc-facility">Byars Family Genomic Intelligence</div>
    <div class="doc-pname">${d.pname}</div>
    <div class="doc-dob">${d.dob}</div>
    <div class="doc-date">Report date: ${today}</div>
    <div class="doc-badge">${d.badge}</div>
  </div>
  <div class="doc-body">
  <div style="font-size:11px;color:#6B7280;line-height:1.65;padding:14px 0 4px;border-bottom:1px solid #EAEAEA;margin-bottom:4px">This report was prepared to help your care team understand this patient's genetic background. Please share it with any physician who may prescribe medications or plan procedures. Genomic data should be interpreted alongside clinical context — not in isolation.</div>`;

  // PGx section
  h+=`<div class="doc-sec"><div class="doc-sec-t">Pharmacogenomics</div>`;
  d.pgx.forEach(r=>{h+=`<div class="doc-row"><span class="doc-rl">${r.l}</span><span class="doc-rv${r.alert?' alert':''}">${r.v}</span></div>`;});
  h+=`</div>`;

  // Risk section
  h+=`<div class="doc-sec"><div class="doc-sec-t">Genetic Risk Factors</div>`;
  d.risk.forEach(r=>{h+=`<div class="doc-row"><span class="doc-rl">${r.l}</span><span class="doc-rv${r.alert?' alert':''}">${r.v}</span></div>`;});
  h+=`</div>`;

  // Alerts
  if(d.alerts&&d.alerts.length){
    h+=`<div class="doc-sec"><div class="doc-sec-t">Critical Alerts</div><div class="doc-alert"><div class="doc-alert-t">Prescribing Cautions</div>`;
    d.alerts.forEach(a=>{h+=`<div class="doc-alert-i">${a}</div>`;});
    h+=`</div></div>`;
  }

  // Safe
  if(d.safe&&d.safe.length){
    h+=`<div class="doc-sec"><div class="doc-ok"><div class="doc-ok-t">Known Safe</div>`;
    d.safe.forEach(a=>{h+=`<div class="doc-ok-i">${a}</div>`;});
    h+=`</div></div>`;
  }

  h+=`<div style="font-size:11px;color:#9CA3AF;line-height:1.65;padding:18px 0 0;border-top:1px solid #EAEAEA;margin-top:20px;font-style:italic">Genomic data is one piece of this patient's health picture. Your providers have clinical context that numbers alone can never capture. This report was generated from direct-to-consumer genotyping and whole-genome sequencing data.</div>
  </div><!-- /doc-body -->
  <button class="print-btn" onclick="window.print()">Print Clinical Report</button>
  </div>`;
  return h;
}
