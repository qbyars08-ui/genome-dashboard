<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STRAND — Brother Byars</title>
  <link rel="stylesheet" href="assets/strand.css">
  <link rel="stylesheet" href="assets/strand-cards.css">
</head>
<body>
  <div id="strand-loader"></div>
  <div id="strand-shell">
    <div id="strand-body">
      <nav id="strand-rail"></nav>
      <main id="strand-main">
        <div id="section-overview" class="section active"></div>
        <div id="section-actions" class="section"></div>
        <div id="section-ancestry" class="section"></div>
        <div id="section-family" class="section"></div>
        <div id="section-clinical" class="section"></div>
      </main>
    </div>
  </div>
  <section id="strand-family-rail"></section>
  <footer id="strand-footer"></footer>
  <script src="data/brother.js"></script>
  <!-- Private PACS viewer URLs — gitignored and vercelignored. Falls back silently if absent. -->
  <script src="_private/imaging-urls.js" onerror="this.onerror=null;this.remove();"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="assets/strand-shell.js"></script>
  <script src="assets/strand-tracking.js"></script>
  <script src="assets/strand-cards.js"></script>
  <script src="assets/strand-family-tree.js"></script>
  <script src="assets/strand-app.js"></script>
</body>
</html>
